{% extends 'main_app/homepage/base.html'%}
{% load static %}

{% block content %}
<!DOCTYPE html>
<html>
<head>
    <title>Register</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card shadow">
                <div class="card-header text-center bg-primary text-white">
                    <h4>Register</h4>
                </div>

                <div class="card-body">
                    <form method="POST">
                        {% csrf_token %}

                        <div class="mb-3">
                            <label>Username</label>
                            {{ form.username }}
                        </div>

                        <div class="mb-3">
                            <label>Email</label>
                            {{ form.email }}
                        </div>
                         <div class="mb-3">
                            <div class="combobox-wrapper">
        <!-- Label linked to the input via 'for' attribute -->
        <label class="combobox-label" for="course-select">Select or Type a Program:</label>
        
        <!-- The Input field that acts as the combo box trigger -->
        <input 
            type="text" 
            id="course-select" 
            class="combobox-input" 
            list="courses-list" 
            placeholder="e.g., Choral Conducting"
        >

        <!-- The Datalist container holding all searchable dropdown choices -->
        <datalist id="courses-list">
            <option value="ict level4"></option>
             <option value="ict level5"></option>
             <option value="ict level5"></option>
            <option value="Diploma in Cyber Security"></option>
            <option value="social work level 5"></option>
            <option value="social work level 6"></option>
            <option value="food and beverage production (culinary)level 3"></option>
            <option value="food and beverage production (culinary)level 4"></option>
            <option value="food and beverage production (culinary)level 5"></option>
            <option value="food and beverage production (culinary)level 6"></option>
            <option value="cosmetology level 3"></option>
            <option value="cosmetology level 4"></option>
            <option value="cosmetology level 5"></option>
            <option value="cosmetology level 6"></option>
        </datalist>
    </div>
                            
                        </div>

                        <div class="mb-3">
                            <label>Password</label>
                            {{ form.password }}
                        </div>

                        <div class="mb-3">
                            <label>Confirm Password</label>
                            {{ form.confirm_password }}
                        </div>

                        <button type="submit" class="btn btn-primary w-100">Register</button>
                    </form>
                </div>

                <div class="card-footer text-center">
                    Already have an account? <a href="{% url 'login_page' %}">Login</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock content%}
</body>
</html>
